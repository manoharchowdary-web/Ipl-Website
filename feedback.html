<!DOCTYPE html>
<html>
<head>
<title>IPL Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#6600ff;
}

/* HEADER */

header{
    background:#1e3c72;
    color:white;
    padding:20px;
    text-align:center;
}

/* NAVBAR */

nav{
    background:#0f2027;
    display:flex;
    justify-content:center;
}

nav a{
    color:rgb(0,255,42);
    padding:14px 20px;
    text-decoration:none;
}

nav a:hover{
    background:#ddd;
    color:black;
}

/* FORM CARD */

.feedback-card{
    background:white;
    padding:30px;
    margin-top:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* HISTORY CARD */

.history-card{
    background:white;
    padding:30px;
    margin-top:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>
<h1>Indian Premier League (IPL)</h1>
<p>Fan Feedback Page</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="teams.html">Teams</a>
<a href="matches.html">Matches</a>
<a href="rankings.html">Points Table</a>
<a href="feedback.html">Feedback</a>
</nav>

<div class="container">

<!-- FEEDBACK FORM -->

<div class="feedback-card">

<h2 class="text-center mb-4">IPL Fan Feedback Form</h2>

<form id="feedbackForm">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" id="name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="email" required>
</div>

<div class="mb-3">
<label class="form-label">Favorite IPL Team</label>
<select class="form-select" id="team">
<option>Royal Challengers Bangalore</option>
<option>Mumbai Indians</option>
<option>Chennai Super Kings</option>
<option>Kolkata Knight Riders</option>
<option>Rajasthan Royals</option>
<option>Sunrisers Hyderabad</option>
<option>Punjab Kings</option>
<option>Delhi Capitals</option>
<option>Lucknow Super Giants</option>
<option>Gujarat Titans</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Rating</label>
<br>
<input type="radio" name="rating" value="Excellent" required> Excellent
<input type="radio" name="rating" value="Good"> Good
<input type="radio" name="rating" value="Average"> Average
<input type="radio" name="rating" value="Poor"> Poor
</div>

<div class="mb-3">
<label class="form-label">Feedback Message</label>
<textarea class="form-control" id="message" rows="4"></textarea>
</div>

<button type="submit" class="btn btn-primary w-100">Submit Feedback</button>

</form>

<div id="successMessage" class="mt-3 text-success text-center"></div>

</div>

<!-- FEEDBACK HISTORY -->

<div class="history-card">

<h3 class="text-center mb-3">Fan Feedback History</h3>

<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
<th>Name</th>
<th>Email</th>
<th>Team</th>
<th>Rating</th>
<th>Message</th>
<th>Action</th>
</tr>
</thead>

<tbody id="feedbackHistory">

</tbody>

</table>

</div>

</div>

<script>

const form = document.getElementById("feedbackForm");
const messageBox = document.getElementById("successMessage");

form.addEventListener("submit",function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let team = document.getElementById("team").value;
let message = document.getElementById("message").value;

let rating = document.querySelector('input[name="rating"]:checked').value;

let feedback = {
name:name,
email:email,
team:team,
rating:rating,
message:message
};

let history = JSON.parse(localStorage.getItem("iplFeedback")) 

history.push(feedback);

localStorage.setItem("iplFeedback", JSON.stringify(history));

displayFeedback();

messageBox.innerHTML = "✅ Thank you! Your feedback has been submitted.";

form.reset();

});

function displayFeedback(){

let history = JSON.parse(localStorage.getItem("iplFeedback")) 

let table = document.getElementById("feedbackHistory");
table.innerHTML="";

history.forEach(function(f,index){

table.innerHTML += `
<tr>
<td>${f.name}</td>
<td>${f.email}</td>
<td>${f.team}</td>
<td>${f.rating}</td>
<td>${f.message}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteFeedback(${index})">Delete</button>
</td>
</tr>
`;

});

}

function deleteFeedback(index){

let history = JSON.parse(localStorage.getItem("iplFeedback")) || [];

history.splice(index,1);

localStorage.setItem("iplFeedback", JSON.stringify(history));

displayFeedback();

}

window.onload = displayFeedback;

</script>

</body>
</html>
